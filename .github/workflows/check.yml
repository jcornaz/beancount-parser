name: check

on:
  push:
    branches: [main, v1, v2, v3]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@v4
      - run: mise verify
